<!DOCTYPE html>
<html>
<head>
  <title>Grocery Delivery System</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
  <h1>Grocery Delivery System</h1>
  <div class="user-section">
    <span id="welcomeUser"></span>
    <button onclick="logout()">Logout</button>
  </div>
</header>

<div class="container">

  <input type="text" id="searchBar" placeholder="Search products..." onkeyup="searchProducts()">

  <h2>Categories</h2>
  <div id="categories">
    <button onclick="filterCategory('All')">All</button>
    <button onclick="filterCategory('Dairy')">Dairy</button>
    <button onclick="filterCategory('Meat')">Meat</button>
    <button onclick="filterCategory('Fruits')">Fruits</button>
    <button onclick="filterCategory('Vegetables')">Vegetables</button>
    <button onclick="filterCategory('Pantry')">Pantry</button>
    <button onclick="filterCategory('Snacks')">Snacks</button>
    <button onclick="filterCategory('Drinks')">Drinks</button>
    <button onclick="filterCategory('Frozen')">Frozen</button>
  </div>

  <h2>Products</h2>
  <div id="product-list" class="products"></div>

  <h2>Shopping Cart</h2>
  <ul id="cart"></ul>
  <h3>Total: $<span id="total">0</span></h3>
  <button onclick="checkout()">Checkout</button>

  <h2>Order History</h2>
  <ul id="orderHistory"></ul>

</div>

<!-- Checkout -->
<div id="checkoutForm" class="checkout-form hidden">
  <h3>Checkout</h3>
  <input id="customerName" placeholder="Full Name">
  <input id="customerAddress" placeholder="Delivery Address">

  <select id="deliveryTime">
    <option>9am - 12pm</option>
    <option>12pm - 3pm</option>
    <option>3pm - 6pm</option>
  </select>

  <button onclick="confirmCheckout()">Place Order</button>
  <button onclick="cancelCheckout()">Cancel</button>
</div>

<div id="orderConfirmation" class="checkout-form hidden">
  <h3>Order Placed!</h3>
  <p id="orderSummary"></p>
  <button onclick="closeConfirmation()">Close</button>
</div>

<script src="script.js"></script>

</body>
</html>
