<html>
<head>
  <title>Grocery Delivery System</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
  <h1>Grocery Delivery System</h1>
  <div class="user-section">
    <span id="welcomeUser"></span>
    <button onclick="logout()">Logout</button>
  </div>
</header>

<div class="container">
  <h2>Products</h2>
  <div id="product-list" class="products"></div>

  <h2>Shopping Cart</h2>
  <ul id="cart"></ul>
  <h3>Total: $<span id="total">0</span></h3>
  <button onclick="checkout()">Checkout</button>
</div>

<!-- Checkout Form -->
<div id="checkoutForm" class="checkout-form hidden">
  <h3>Checkout</h3>
  <p>Enter delivery details:</p>
  <input id="customerName" placeholder="Full Name">
  <input id="customerAddress" placeholder="Delivery Address">
  <label for="deliveryTime">Delivery Time Slot:</label>
  <select id="deliveryTime">
    <option value="9am-12pm">9am - 12pm</option>
    <option value="12pm-3pm">12pm - 3pm</option>
    <option value="3pm-6pm">3pm - 6pm</option>
  </select>
  <button onclick="confirmCheckout()">Place Order</button>
  <button onclick="cancelCheckout()">Cancel</button>
</div>

<!-- Order Confirmation -->
<div id="orderConfirmation" class="checkout-form hidden">
  <h3>Thank you! Your order has been placed.</h3>
  <p id="orderSummary"></p>
  <button onclick="closeConfirmation()">Close</button>
</div>

<script src="script.js"></script>

</body>
</html>
